# 2-machine cluster: Machine A runs coordinator + W0 + W1, Machine B runs W2 + W3
# Replace MACHINE_A_IP and MACHINE_B_IP with actual static IPs before use.
#
# Suggested static IP assignment (set manually, no router/DHCP needed):
#   Machine A: 192.168.1.10
#   Machine B: 192.168.1.11

coordinator_host = 192.168.1.10
coordinator_port = 9000
num_workers      = 4
damping_factor   = 0.85
convergence_threshold = 1e-6
max_iterations   = 100
top_k            = 100

# Workers 0 and 1 run on Machine A alongside the coordinator
[worker_0]
host = 192.168.1.10
port = 9001

[worker_1]
host = 192.168.1.10
port = 9002

# Workers 2 and 3 run on Machine B
[worker_2]
host = 192.168.1.11
port = 9003

[worker_3]
host = 192.168.1.11
port = 9004
